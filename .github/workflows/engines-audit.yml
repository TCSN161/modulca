name: Weekly Engine Billing Audit

# Runs the engine billing audit every Monday at 08:00 UTC (10:00 Bucharest time).
# If anything expired or changed since the last baseline, it opens / comments on
# a GitHub Issue so we review pricing and free-quota status at least weekly.
#
# Manual trigger also available from the Actions tab.

on:
  schedule:
    # 08:00 UTC every Monday — cron syntax: min hour dom month dow
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      save_baseline:
        description: "Save this run's state as the new baseline (reset diff)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The audit script uses zero runtime deps — no `npm install` needed.
      - name: Run engines audit (JSON)
        id: audit
        run: |
          set +e
          OUTPUT=$(node scripts/engines-audit.mjs --json 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          # Save for later steps
          echo "$OUTPUT" > audit-report.json
          # Pretty-print a short summary into the step log
          node -e "
            const r = JSON.parse(require('fs').readFileSync('audit-report.json', 'utf-8'));
            console.log('— Engines:', Object.values(r.byRoleCount).reduce((a,b)=>a+b,0));
            console.log('— Expired:', r.expired.length);
            console.log('— Expiring 30d:', r.expiringSoon.length);
            console.log('— Changes:', r.changes.length);
            console.log('— Roles:', JSON.stringify(r.byRoleCount));
          "
          exit 0

      - name: Render human report
        id: report
        run: |
          node -e "
          const fs = require('fs');
          const r = JSON.parse(fs.readFileSync('audit-report.json', 'utf-8'));

          const lines = [];
          lines.push('## 🔍 Weekly Engine Billing Audit');
          lines.push('');
          lines.push(\`**Review date:** \${r.reviewedAt} (next due: \${r.nextReviewDue})\`);
          lines.push('');

          // Counts table
          const roleCounts = r.byRoleCount || {};
          lines.push('| Role | Count |');
          lines.push('|---|---|');
          lines.push(\`| 🟢 hero | \${roleCounts.hero || 0} |\`);
          lines.push(\`| 🔵 backup | \${roleCounts.backup || 0} |\`);
          lines.push(\`| 🟡 premium-only | \${roleCounts['premium-only'] || 0} |\`);
          lines.push(\`| 🔴 do-not-use | \${roleCounts['do-not-use'] || 0} |\`);
          lines.push('');

          // Expired section
          if (r.expired.length > 0) {
            lines.push('### 🔴 Expired');
            for (const e of r.expired) {
              lines.push(\`- **\${e.label}** — expired \${e.expiredDaysAgo}d ago (\${e.freeExpiresAt?.slice(0,10)})\`);
            }
            lines.push('');
          }

          // Expiring soon
          if (r.expiringSoon.length > 0) {
            lines.push('### 🟡 Expiring within 30 days');
            for (const e of r.expiringSoon) {
              lines.push(\`- **\${e.label}** — in \${e.daysRemaining}d (\${e.freeExpiresAt?.slice(0,10)})\`);
            }
            lines.push('');
          }

          // Changes
          if (r.changes.length > 0) {
            lines.push('### 🔀 Changes since last baseline');
            for (const c of r.changes) {
              if (c.type === 'added') lines.push(\`- ➕ **added**: \\\`\${c.id}\\\`\`);
              else if (c.type === 'removed') lines.push(\`- ➖ **removed**: \\\`\${c.id}\\\`\`);
              else if (c.type === 'modified') {
                lines.push(\`- ✏️  **modified**: \\\`\${c.id}\\\`\`);
                for (const d of c.diffs) {
                  lines.push(\`  - \\\`\${d.key}\\\`: \\\`\${JSON.stringify(d.from)}\\\` → \\\`\${JSON.stringify(d.to)}\\\`\`);
                }
              } else if (c.type === 'baseline-unreadable') {
                lines.push(\`- ⚠️  baseline unreadable: \${c.error}\`);
              }
            }
            lines.push('');
          }

          // All clear?
          if (r.expired.length === 0 && r.expiringSoon.length === 0 && r.changes.length === 0 && r.baselineExisted) {
            lines.push('### ✅ All clear — no action required');
            lines.push('');
            lines.push('All free quotas are healthy, nothing expiring in the next 30 days, and no changes detected since last audit.');
          }

          lines.push('');
          lines.push('---');
          lines.push('*Auto-generated by .github/workflows/engines-audit.yml — run locally with \\\`npm run engines:audit\\\`*');

          fs.writeFileSync('audit-report.md', lines.join('\n'));

          // Decide if we need to notify
          const needsAttention = r.expired.length > 0 ||
                                 r.expiringSoon.length > 0 ||
                                 r.changes.length > 0 ||
                                 !r.baselineExisted;
          console.log('needs_attention=' + (needsAttention ? 'true' : 'false'));
          " >> "$GITHUB_OUTPUT"
          cat audit-report.md

      - name: Open or update issue (only if attention needed)
        if: contains(steps.report.outputs.needs_attention, 'true') || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('audit-report.md', 'utf-8');
            const TITLE_PREFIX = 'Engine billing audit — ';
            const today = new Date().toISOString().slice(0, 10);
            const title = `${TITLE_PREFIX}${today}`;

            // Find an existing open audit issue from the last 7 days
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'engine-audit',
              per_page: 20,
            });

            const existing = issues.data.find(i => i.title.startsWith(TITLE_PREFIX));

            if (existing) {
              // Comment on the existing one (weekly cadence)
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              console.log(`Commented on existing issue #${existing.number}`);
            } else {
              // New issue
              const res = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['engine-audit'],
              });
              console.log(`Opened new issue #${res.data.number}`);
            }

      - name: Save baseline (manual run with save_baseline=true)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.save_baseline == 'true'
        run: node scripts/engines-audit.mjs --save

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engines-audit-${{ github.run_id }}
          path: |
            audit-report.json
            audit-report.md
          retention-days: 90
