name: CI — Build, Test, Type Check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run --reporter=verbose

      - name: Build
        run: npm run build
        env:
          # Minimal env for build (no real secrets)
          NEXT_PUBLIC_APP_URL: "https://www.modulca.eu"
          NEXT_PUBLIC_APP_NAME: "ModulCA"

      - name: Check bundle size
        run: |
          echo "Build output:"
          du -sh .next/ 2>/dev/null || echo "Build dir not found"
          echo "---"
          # Fail if build exceeds 500MB
          SIZE=$(du -sm .next/ 2>/dev/null | cut -f1)
          if [ "$SIZE" -gt 500 ]; then
            echo "::error::Build too large: ${SIZE}MB (max 500MB)"
            exit 1
          fi
          echo "Build size: ${SIZE}MB — OK"
