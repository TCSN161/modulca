name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/modulca"
      NEXTAUTH_SECRET: "build-time-placeholder"
      NEXTAUTH_URL: "https://tcsn161.github.io/modulca"
      NEXT_PUBLIC_MAPBOX_TOKEN: "pk.placeholder"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder"
      NEXT_PUBLIC_APP_URL: "https://tcsn161.github.io/modulca"
      NEXT_PUBLIC_APP_NAME: "ModulCA"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
